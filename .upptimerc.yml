# Franchsoft PROD Uptime Monitoring
# Положить как .upptimerc.yml в корень репо franchsoft-uptime-prod

owner: dispellka  # заменить на свой GitHub username (или organization)
repo: franchsoft-uptime-prod

sites:
  - name: API (Franchsoft PROD)
    url: https://api.franchsoft.ru/health
    expectedStatusCodes:
      - 200
  - name: Admin (Franchsoft PROD)
    url: https://admin.franchsoft.ru
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Loyalty Landing
    url: https://loyalty.myataofficial.com
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Legal Docs (152-ФЗ)
    url: https://docs.myataofficial.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

# Кому назначать GitHub Issues при падении (GitHub username)
assignees:
  - dispellka

# Статус-страница (публикуется на GitHub Pages)
status-website:
  name: Franchsoft PROD Status
  introTitle: Franchsoft — PROD
  introMessage: Статус сервисов Franchsoft в продакшене.
  logoUrl: ""
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/dispellka/franchsoft-uptime-prod

# Язык писем/сообщений (необязательно)
i18n:
  activeIncidents: Активные инциденты
  allSystemsOperational: Все сервисы работают
  incidentReport: Отчёт об инциденте
  down: Недоступен
  up: Работает
  degraded: Деградация
